services:
  # Backend API Service
  - type: web
    name: kaloss-coffee-backend
    runtime: node
    repo: https://github.com/metadel12/kaloss-coffee
    branch: master
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://kaloss-coffee-frontend.onrender.com
      # Database (replace with your actual values)
      - key: DATABASE_URL
        value: mongodb+srv://username:password@cluster.mongodb.net/kaloss_coffee
      # Security
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this
      - key: JWT_EXPIRE
        value: 30d
      # Stripe
      - key: STRIPE_SECRET_KEY
        value: sk_live_your_stripe_secret_key
      # Email (if using)
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        value: your_email@gmail.com
      - key: EMAIL_PASS
        value: your_app_password

  # Frontend Next.js Service
  - type: web
    name: kaloss-coffee-frontend
    runtime: node
    repo: https://github.com/metadel12/kaloss-coffee
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://kaloss-coffee-backend.onrender.com
      - key: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
        value: pk_live_your_stripe_public_key
